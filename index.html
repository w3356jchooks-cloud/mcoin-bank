<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mcoin Bank & Miner</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            border-bottom: 2px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: #58a6ff; margin: 0; }
        .nav-links a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }
        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        h2 { color: #f2c744; margin-top: 0; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .balance {
            font-size: 32px;
            color: #39d353;
            font-weight: bold;
            margin: 15px 0;
        }
        button {
            background-color: #238636;
            color: white;
            border: 1px solid #2ea44f;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #2ea44f; }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            margin-top: 5px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .leaderboard-table th {
            text-align: left;
            color: #8b949e;
            font-size: 12px;
            padding: 8px;
            border-bottom: 2px solid #30363d;
        }
        .leaderboard-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        .rank-highlight { color: #f2c744; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>🪙 Mcoin Miner Node Dashboard</h1>
                <small style="color: #8b949e;">Multiplayer Cloud Account Network</small>
            </div>
            <div class="nav-links">
                <a href="market.html">🛒 Open P2P Market</a>
            </div>
        </header>

        <div class="grid">
            <div>
                <div class="panel">
                    <h2>👤 Identity Profile</h2>
                    <label style="font-size: 12px; color: #8b949e;">Set Leaderboard Username:</label>
                    <input type="text" id="username-input" placeholder="Enter custom player name...">
                </div>

                <div class="panel">
                    <h2>⛏️ Local Node Core Miner</h2>
                    <div class="balance"><span id="balance-display">0.0000</span> MC</div>
                    <button id="mine-btn">COMPUTE COIN BLOCK</button>
                </div>
            </div>

            <div>
                <div class="panel">
                    <h2>🏆 Live Global Leaderboard</h2>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">Rank</th>
                                <th>Miner / Handle</th>
                                <th style="text-align: right;">Net Worth</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-rows">
                            <tr>
                                <td colspan="3" style="color:#8b949e; font-style:italic; text-align:center; padding: 20px;">
                                    Syncing node indices...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBa48LETDA6N1TgN6NhGHLSDEO2nSvfyY",
            authDomain: "mcoin-bank-market.firebaseapp.com",
            databaseURL: "https://mcoin-bank-market-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mcoin-bank-market",
            storageBucket: "mcoin-bank-market.firebasestorage.app",
            messagingSenderId: "402636863684",
            appId: "1:402636863684:web:164bbf0e8781fa92c7c551",
            measurementId: "G-8BENPQDSWX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Track and format the local balance engine
        let rawStorageValue = localStorage.getItem('mcoin_balance');
        let balance = (rawStorageValue !== null && !isNaN(parseFloat(rawStorageValue))) ? parseFloat(rawStorageValue) : 1000.0000;
        
        // Match market memory key for cross-page persistence
        let username = localStorage.getItem('mcoin_market_username') || "Anonymous_Miner";
        
        document.getElementById('balance-display').innerText = balance.toFixed(4);
        document.getElementById('username-input').value = username;

        // Function to push latest mining data to global database rankings
        function syncBalanceToLeaderboard() {
            if (username.trim() !== "" && username !== "Anonymous_Miner") {
                const minerRef = ref(db, `leaderboard/${username}`);
                set(minerRef, {
                    score: parseFloat(balance.toFixed(4))
                });
            }
        }

        // Run an initial broadcast so the player shows up when logging in
        syncBalanceToLeaderboard();

        // Handle profile username alterations
        document.getElementById('username-input').addEventListener('input', (e) => {
            const newName = e.target.value.trim();
            if (newName) {
                username = newName;
                localStorage.setItem('mcoin_market_username', username);
                syncBalanceToLeaderboard();
            }
        });

        // Mine button routine
        document.getElementById('mine-btn').addEventListener('click', () => {
            // Generate standard fractional block reward increment
            balance += (Math.random() * 0.05) + 0.01;
            localStorage.setItem('mcoin_balance', balance);
            document.getElementById('balance-display').innerText = balance.toFixed(4);
            
            // Push calculation block instantly to everyone else's screen globally
            syncBalanceToLeaderboard();
        });

        // Watch global ranking network array updates real-time
        const leaderboardRef = ref(db, "leaderboard");
        onValue(leaderboardRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('leaderboard-rows');
            container.innerHTML = '';

            if (!data) {
                container.innerHTML = `<tr><td colspan="3" style="color:#8b949e; text-align:center;">No active blocks detected. Start mining to claim rank #1!</td></tr>`;
                return;
            }

            // Convert map to sorted list structure
            let items = [];
            Object.keys(data).forEach(key => {
                items.push({ name: key, score: data[key].score });
            });

            // Sort highest balance down to lowest balance
            items.sort((a, b) => b.score - a.score);

            // Render top players
            items.forEach((player, index) => {
                const row = document.createElement('tr');
                let rankDisplay = index + 1;
                
                // Add stylized crowns or tags to podium ranks
                if (rankDisplay === 1) rankDisplay = "🥇";
                else if (rankDisplay === 2) rankDisplay = "🥈";
                else if (rankDisplay === 3) rankDisplay = "🥉";

                row.innerHTML = `
                    <td class="rank-highlight">${rankDisplay}</td>
                    <td style="color: ${player.name === username ? '#58a6ff' : '#c9d1d9'}; font-weight: ${player.name === username ? 'bold' : 'normal'}">
                        ${escapeHTML(player.name)} ${player.name === username ? '<small>(You)</small>' : ''}
                    </td>
                    <td style="text-align: right; color: #39d353; font-weight: bold;">${player.score.toFixed(4)} MC</td>
                `;
                container.appendChild(row);
            });
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
