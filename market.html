<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mcoin P2P Open Market</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 { color: #58a6ff; margin: 0; }
        .wallet-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
        }
        .wallet-amount { color: #39d353; }
        
        .market-grid {
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            gap: 30px;
        }
        
        .panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 6px;
            height: fit-content;
        }
        h2 { color: #f2c744; margin-top: 0; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #8b949e;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
        }
        /* Custom styling for standard file input */
        input[type="file"] {
            color: #8b949e;
            font-size: 13px;
        }
        button {
            width: 100%;
            background-color: #238636;
            color: white;
            border: 1px solid #2ea44f;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
        }
        button:hover { background-color: #2ea44f; }
        
        .listings-table {
            width: 100%;
            border-collapse: collapse;
        }
        .listings-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #30363d;
            color: #8b949e;
            font-size: 14px;
        }
        .listings-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
            vertical-align: middle;
        }
        .item-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            display: block;
        }
        .item-info-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .buy-btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 6px 12px;
            width: auto;
            border-radius: 4px;
        }
        .buy-btn:hover {
            background-color: #58a6ff;
            color: #0d1117;
        }
        .empty-msg {
            color: #8b949e;
            font-style: italic;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>🛒 Mcoin P2P Market</h1>
                <small style="color: #8b949e;">
                    Live Multiplayer Trading Engine | 
                    <a href="index.html" style="color: #58a6ff; text-decoration: none;">⬅️ Back to Dashboard</a>
                </small>
            </div>
            <div class="wallet-card">
                Your Balance: <span class="wallet-amount" id="balance-display">1000</span> 🪙 MC
            </div>
        </header>

        <div class="market-grid">
            <div class="panel">
                <h2>📦 Host an Open Trade</h2>
                <form id="trade-form">
                    <div class="form-group">
                        <label>Your Username/Seller ID (Case-Sensitive!)</label>
                        <input type="text" id="seller-name" placeholder="e.g., Player_One" required>
                    </div>
                    <div class="form-group">
                        <label>Item / Asset Name</label>
                        <input type="text" id="item-name" placeholder="e.g., Rare Sprite Pack" required>
                    </div>
                    <div class="form-group">
                        <label>Import Item Image (.PNG/.JPG - Optional)</label>
                        <input type="file" id="item-file" accept="image/png, image/jpeg">
                    </div>
                    <div class="form-group">
                        <label>Asking Price (in Mcoin)</label>
                        <input type="number" id="item-price" min="1" placeholder="e.g., 150" required>
                    </div>
                    <button type="submit" id="submit-btn">Deploy Live Listing</button>
                </form>
            </div>

            <div class="panel">
                <h2>⚖️ Active Global Trade Listings</h2>
                <table class="listings-table">
                    <thead>
                        <tr>
                            <th>Item Asset / Preview</th>
                            <th>Seller ID</th>
                            <th>Cost</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="market-listings"></tbody>
                </table>
                <div id="no-trades" class="empty-msg">Waiting for database connection sync...</div>
            </div>
        </div>
    </div>

    <!-- Load Firebase Modules directly from CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        // Connected to Singapore Asia Node
        const firebaseConfig = {
            apiKey: "AIzaSyCBa48LETDA6N1TgN6NhGHLSDEO2nSvfyY",
            authDomain: "mcoin-bank-market.firebaseapp.com",
            databaseURL: "https://mcoin-bank-market-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mcoin-bank-market",
            storageBucket: "mcoin-bank-market.firebasestorage.app",
            messagingSenderId: "402636863684",
            appId: "1:402636863684:web:164bbf0e8781fa92c7c551",
            measurementId: "G-8BENPQDSWX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const marketRef = ref(db, "open_trades");

        let currentBalance = parseInt(localStorage.getItem('mcoin_balance')) || 1000;
        localStorage.setItem('mcoin_balance', currentBalance);
        document.getElementById('balance-display').innerText = currentBalance;

        const rememberedUser = localStorage.getItem('mcoin_market_username');
        if (rememberedUser) {
            document.getElementById('seller-name').value = rememberedUser;
            listenForPayouts(rememberedUser);
        }

        document.getElementById('seller-name').addEventListener('input', (e) => {
            const name = e.target.value.trim();
            if (name) {
                localStorage.setItem('mcoin_market_username', name);
                listenForPayouts(name);
            }
        });

        document.getElementById('trade-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const seller = document.getElementById('seller-name').value.trim();
            const item = document.getElementById('item-name').value;
            const price = parseInt(document.getElementById('item-price').value);
            const fileInput = document.getElementById('item-file');

            localStorage.setItem('mcoin_market_username', seller);
            submitBtn.innerText = "Processing Asset...";
            submitBtn.disabled = true;

            let imgUrl = ""; // Stays empty if file skipped

            // If a PNG/JPG is selected, compress and process it to base64 data URL
            if (fileInput.files && fileInput.files[0]) {
                try {
                    imgUrl = await processFileAsBase64(fileInput.files[0]);
                } catch (error) {
                    alert("Image rendering error: " + error.message);
                    submitBtn.innerText = "Deploy Live Listing";
                    submitBtn.disabled = false;
                    return;
                }
            }

            push(marketRef, { seller, item, imgUrl, price })
                .then(() => {
                    document.getElementById('item-name').value = '';
                    document.getElementById('item-file').value = '';
                    document.getElementById('item-price').value = '';
                    submitBtn.innerText = "Deploy Live Listing";
                    submitBtn.disabled = false;
                    listenForPayouts(seller);
                })
                .catch((err) => {
                    alert("Database Error: " + err.message);
                    submitBtn.innerText = "Deploy Live Listing";
                    submitBtn.disabled = false;
                });
        });

        // Function to read image file and compress it using standard browser canvas
        function processFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Enforce max item asset box sizing (120x120 pixels max for rapid DB transfer)
                        const MAX_WIDTH = 120;
                        const MAX_HEIGHT = 120;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Output as compressed JPEG data URL to keep DB payload minimal
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        onValue(marketRef, (snapshot) => {
            const listingsContainer = document.getElementById('market-listings');
            const noTradesMessage = document.getElementById('no-trades');
            listingsContainer.innerHTML = '';

            const data = snapshot.val();
            if (!data) {
                noTradesMessage.style.display = 'block';
                noTradesMessage.innerText = "No active trades currently hosted on the market grid.";
                return;
            }

            noTradesMessage.style.display = 'none';

            Object.keys(data).forEach((dbKey) => {
                const trade = data[dbKey];
                const row = document.createElement('tr');
                
                let imgHtml = '';
                if (trade.imgUrl && trade.imgUrl.trim() !== '') {
                    // Safe injection of data URL strings directly into src attribute
                    imgHtml = `<img src="${trade.imgUrl}" class="item-preview" alt="Asset" onerror="this.style.display='none'">`;
                }

                row.innerHTML = `
                    <td>
                        <div class="item-info-cell">
                            ${imgHtml}
                            <span style="font-weight: bold; color: #c9d1d9;">${escapeHTML(trade.item)}</span>
                        </div>
                    </td>
                    <td style="color: #8b949e;">${escapeHTML(trade.seller)}</td>
                    <td style="color: #39d353; font-weight: bold;">${trade.price} MC</td>
                    <td><button class="buy-btn" data-key="${dbKey}" data-price="${trade.price}" data-item="${escapeHTML(trade.item)}" data-seller="${escapeHTML(trade.seller)}">BUY</button></td>
                `;
                listingsContainer.appendChild(row);
            });

            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetKey = e.target.getAttribute('data-key');
                    const cost = parseInt(e.target.getAttribute('data-price'));
                    const itemName = e.target.getAttribute('data-item');
                    const sellerName = e.target.getAttribute('data-seller');
                    executePurchase(targetKey, cost, itemName, sellerName);
                });
            });
        });

        function executePurchase(dbKey, price, item, seller) {
            let balance = parseInt(localStorage.getItem('mcoin_balance'));

            if (balance < price) {
                alert("❌ Transaction Failed: Insufficient Mcoin balance.");
                return;
            }

            balance -= price;
            localStorage.setItem('mcoin_balance', balance);
            document.getElementById('balance-display').innerText = balance;

            const payoutRef = ref(db, `payouts/${seller}`);
            push(payoutRef, { amount: price, item: item })
                .then(() => {
                    const targetItemRef = ref(db, `open_trades/${dbKey}`);
                    return remove(targetItemRef);
                })
                .then(() => {
                    alert(`🎉 Success! You purchased "${item}" from ${seller} for ${price} Mcoin!`);
                });
        }

        let activePayoutListener = null;
        function listenForPayouts(username) {
            if (activePayoutListener) return;
            
            const userPayoutRef = ref(db, `payouts/${username}`);
            activePayoutListener = onValue(userPayoutRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                let totalIncome = 0;
                let itemsSold = [];

                Object.keys(data).forEach((payoutKey) => {
                    totalIncome += data[payoutKey].amount;
                    itemsSold.push(data[payoutKey].item);
                    remove(ref(db, `payouts/${username}/${payoutKey}`));
                });

                if (totalIncome > 0) {
                    let balance = parseInt(localStorage.getItem('mcoin_balance')) || 0;
                    balance += totalIncome;
                    localStorage.setItem('mcoin_balance', balance);
                    document.getElementById('balance-display').innerText = balance;

                    alert(`💰 Income Alert! Your items (${itemsSold.join(', ')}) were purchased! +${totalIncome} Mcoin has been credited to your vault.`);
                }
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
